# Server block for the static business card.
# Listens on 8080 because the base image runs nginx as the unprivileged
# uid 101 (cannot bind <1024). Keeps cap_drop: ALL viable — no NET_BIND_SERVICE.
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Single self-contained page — gzip the HTML/SVG on the fly.
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    # Baseline security headers. No CSP here because the page inlines its own
    # CSS/JS; tighten with a hashed CSP later if the content stops changing.
    add_header X-Content-Type-Options "nosniff"                always;
    add_header X-Frame-Options        "SAMEORIGIN"             always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Liveness/readiness endpoint — cheap, no disk, excluded from access log.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # The page is a single file; serve it for any unknown path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # vCard: force text/vcard (nginx's mime.types would otherwise tag .vcf as
    # text/x-vcard) and serve inline. With this Content-Type, a tap on iOS
    # Safari opens the native "Add to Contacts" sheet instead of a file download.
    location = /contact.vcf {
        types { }                       # clear inherited map so default_type wins
        default_type text/vcard;
        charset utf-8;
        charset_types text/vcard;       # emit "; charset=utf-8" so Hebrew name isn't garbled
        add_header Content-Disposition "inline" always;
        add_header Cache-Control "no-cache" always;
    }

    # Static assets (logos/favicon) get a sane cache window.
    location /public/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }
}
